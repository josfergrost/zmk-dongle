name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Test
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-cache
      - name: Install West
        run: pip3 install west
      - name: ZMK Build
        uses: zmkfirmware/zmk-action-build@v3
        with:
          board: nice_nano_v2
          shield: corne_dongle
